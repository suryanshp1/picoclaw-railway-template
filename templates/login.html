<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PicoClaw | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #050508;
      background-image: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.15), transparent 60%);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.5), transparent);
    }

    .logo-ring {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    .glass-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    .glass-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      background: rgba(0, 0, 0, 0.4);
    }

    .glass-input::placeholder {
      color: #64748b;
    }

    .btn-primary {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .shake-anim {
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
  </style>
</head>
<body x-data="loginForm()">

  <div class="glass-card" :class="{'shake-anim': errorShake}" @animationend="errorShake = false">
    <div class="logo-ring">P</div>
    <h1 class="text-2xl font-bold text-center text-white mb-1">PicoClaw</h1>
    <p class="text-xs text-center text-slate-400 mb-8">AI Agent Gateway Control Panel</p>
    
    <form @submit.prevent="login()">
      <div class="mb-5">
        <input type="password" placeholder="Admin Password" x-model="password" 
               class="glass-input" :disabled="loading" autofocus>
      </div>
      
      <button type="submit" class="btn-primary" :disabled="loading || !password">
        <span x-text="loading ? 'Authenticating...' : 'Enter Console'"></span>
        <svg x-show="!loading" class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
        </svg>
        <svg x-show="loading" class="animate-spin w-4 h-4 ml-1 relative top-[1px]" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
    </form>
    
    <div class="mt-4 text-center h-5">
      <p x-show="error" x-transition.opacity class="text-xs text-rose-400 font-medium" x-text="error" style="display: none;"></p>
    </div>
  </div>

  <script>
    function loginForm() {
      return {
        password: '',
        loading: false,
        error: '',
        errorShake: false,
        
        async login() {
          if (!this.password) return;
          this.loading = true;
          this.error = '';
          
          try {
            const res = await fetch('/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ password: this.password })
            });
            
            if (res.ok) {
              window.location.href = '/';
            } else {
              this.error = 'Invalid password';
              this.errorShake = true;
              this.password = '';
            }
          } catch (e) {
            this.error = 'Connection failed';
            this.errorShake = true;
          } finally {
            this.loading = false;
          }
        }
      }
    }
  </script>
</body>
</html>
